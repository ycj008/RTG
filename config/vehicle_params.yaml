# ============================================================
# 车辆物理几何参数
# 所有长度单位：米（m），角度单位：度（°）
# ============================================================

gantry:
  # 杆臂向量：天线相位中心 → L-Point（左侧门腿基准点）
  # 在 RTG 局部坐标系下（前进方向=X, 横向=Y, 竖直=Z）
  antenna_a1:
    L_arm: [0.12, 0.08, -8.45]    # [dx, dy, dz]（米）
  antenna_a2:
    L_arm: [0.12, 0.08, -8.45]
  H: 8.45            # 标称高度：天线相位中心到地面垂直距离（米）
  W_span: 20.0       # 跨距：左右门腿物理中心线水平距离（米）

trolley:
  # 小车双天线杆臂补偿（相对于小车本体中心）
  antenna_c1:
    L_arm: [0.05, 0.50, -3.10]
  antenna_c2:
    L_arm: [0.05, -0.50, -3.10]
  H: 3.10

ekf:
  # 过程噪声
  sigma_pos: 0.05          # 位置过程噪声（m）
  sigma_vel: 0.01          # 速度过程噪声（m/s）
  sigma_att: 0.001         # 姿态过程噪声（rad）
  sigma_gyro_bias: 1.0e-5  # 陀螺仪偏置噪声（rad/s）
  sigma_accel_bias: 1.0e-4 # 加速度计偏置噪声（m/s²）
  # 量测噪声
  sigma_gnss_h: 0.03       # GNSS 水平量测噪声（m）
  sigma_gnss_v: 0.05       # GNSS 垂直量测噪声（m）
  # 丢星补偿阈值
  gnss_outage_max_s: 10.0  # 最大惯导补位时长（s）
  imu_coasting_pos_limit: 0.25  # 惯导补位最大位置误差（m）

